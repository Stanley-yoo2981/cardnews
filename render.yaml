# Render Blueprint — 저장소 연결 후 "New + → Blueprint" 로 자동 배포.
# Docker 로 빌드하므로 Chromium/폰트가 이미지에 포함된다.
services:
  - type: web
    name: yeoon-cardnews
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CARDNEWS_IMAGES
        value: "off"
      - key: IMAGE_MODEL
        value: gpt-image-1
      - key: IMAGE_COUNT
        value: "4"
      - key: IMAGE_QUALITY
        value: low
      - key: GENERATE_PIN
        sync: false
      - key: GDRIVE_SA_JSON
        sync: false
      - key: GDRIVE_PARENT_ID
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
