# Render Blueprint — 저장소 연결 후 "New + → Blueprint" 로 자동 배포.
# Docker 로 빌드하므로 Chromium/폰트가 이미지에 포함된다.
services:
  - type: web
    name: yeoon-cardnews
    runtime: docker
    plan: starter          # 영구 디스크는 유료 플랜 필요(무료는 디스크 없음·유휴 시 중지)
    region: singapore      # 한국과 가까운 리전
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY   # 필수 — 대시보드에서 입력
        sync: false
      - key: OPENAI_API_KEY      # 선택 — AI 배경 쓸 때
        sync: false
      - key: CARDNEWS_IMAGES     # AI 배경 on/off
        value: "off"
      - key: IMAGE_MODEL         # gpt-image-1 인증 막히면 dall-e-3
        value: gpt-image-1
      - key: IMAGE_COUNT
        value: "4"
      - key: IMAGE_QUALITY
        value: low
      - key: GENERATE_PIN        # 선택 — 생성 잠금
        sync: false
      - key: GDRIVE_SA_JSON      # 선택 — 구글 드라이브 저장
        sync: false
      - key: GDRIVE_PARENT_ID    # 선택
        sync: false
    disks:
      - name: data
        mountPath: /data         # drafts/ state/ 영구 보존
        sizeGB: 1
